services:
  - type: web
    name: brainstormen-pdf-editor
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run src/app_streamlit.py --server.port $PORT --server.address 0.0.0.0
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
